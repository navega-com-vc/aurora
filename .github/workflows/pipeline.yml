name: aurora CI-CD

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  quality:
    uses: navega-com-vc/pipeline-modules/.github/workflows/quality-security-workflow.yml@master
    with:
      SKIP_AUDIT: true
      CONTINUE_ON_SONARQUBE_ERROR: true
    secrets: inherit

  deploy-main:
    needs: quality
    uses: navega-com-vc/pipeline-modules/.github/workflows/lib-deploy-main.yml@master
    secrets: inherit